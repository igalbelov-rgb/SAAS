server {
    listen 80;
    server_name localhost;

    # הגשת ה-Frontend (React + Vite במצב פיתוח על פורט 5173)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # תמיכה ב-React Router: מונע שגיאות 404 ברענון דפים (F5)
        # הערה: הסרנו את try_files מכאן כי במצב פיתוח Vite מנהל את ה-Routing בעצמו
        # try_files $uri $uri/ /index.html;
    }

    # ניתוב קריאות ה-API אל שרת הפייתון (הורדנו את ה-/ בסוף ה-api כדי להתאים לראוטר)
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ניתוב לדוקומנטציה האוטומטית של FastAPI (Swagger)
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }
}