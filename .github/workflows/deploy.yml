name: CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. שליפת הקוד העדכני מה-Repository בגיטהאב
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. התחברות לשרת ה-EC2 באמצעות SSH והרצת פקודות הפריסה
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}          # כתובת ה-IP הציבורית של השרת
          username: ubuntu                            # שם המשתמש הדיפולטיבי של אובונטו ב-AWS
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}    # מפתח ה-SSH הפרטי (תוכן קובץ ה-pem)
          script: |
            # מעבר לתיקיית הפרויקט בשרת
            cd ~/app

            # משיכת הקוד העדכני ביותר מהענף הנוכחי
            git pull origin ${{ github.ref_name }}

            # כיבוי הקונטיינרים הקיימים בשרת
            docker compose -f docker-compose.prod.yml down

            # בנייה והרמה מחדש ללא Cache כדי שהשינויים יתפסו מייד
            docker compose -f docker-compose.prod.yml up -d --build --no-cache

            # ניקוי אימג'ים ישנים ומיותרים כדי שלא יסתמו את הדיסק של ה-EC2 החינמי
            docker image prune -f