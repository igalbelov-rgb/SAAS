version: '3.8'

services:
  # 1. מסד הנתונים - PostgreSQL
  postgres-db:
    image: postgres:16-alpine
    container_name: saas_postgres_db
    restart: always
    env_file:
      - ./backend/.env.production # משתמש בקובץ הסודות של הפרודקשן לטעינת הסיסמה
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # נמשך אוטומטית מתוך קובץ ה-env.
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. שרת ה-Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile # משתמש ב-Dockerfile הסטנדרטי והמאובטח שלך
    container_name: saas_backend_api
    restart: always
    depends_on:
      postgres-db:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    networks:
      - saas-network

  # 4. מנוע האוטומציה וההפצה - n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: saas_n8n_automation
    restart: always
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-automation/workflows:/etc/n8n/workflows
    env_file:
      - ./backend/.env.production
    ports:
      - "5678:5678" # פורט ברירת המחדל של n8n
    environment:
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_ENVS_MODE=strict
      - N8N_ENVS_LIST=TELEGRAM_CHAT_ID,TELEGRAM_TOKEN
      

      # החלף את localhost בדומיין האמיתי שלך כשתעלה לפרודקשן (למשל https://yourdomain.com/n8n/)
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - WEBHOOK_URL=http://localhost:5678/
    networks:
      - saas-network

  # 5. שומר הסף והראוטר המרכזי - Nginx
  nginx:
    container_name: saas_nginx_proxy
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: always
    ports:
      - "80:80"   # מאזין לפורט הציבורי של השרת
      - "443:443" # מוכן לתעודות SSL
    volumes:
      # דורסים עם קובץ הפרודקשן
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      
      # --- החלק החסר! מיפוי קבצי הפרונטאנד ל-Nginx ---
      # (הנחה שהפרונטאנד נבנה לתיקיית dist, שנה ל-build במידת הצורך)
      # - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - n8n
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local # שומר את המידע פיזית על הדיסק של ה-EC2
  n8n_data:
    driver: local # שומר את הגדרות ה-n8n פיזית על הדיסק של ה-EC2