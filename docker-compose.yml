version: '3.8'

services:
  # 1. מסד הנתונים - PostgreSQL
  postgres-db:
    image: postgres:16-alpine
    container_name: saas_postgres_db
    restart: always
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_robust_password_2026 # בפרודקשן אמיתי נמשוך מ-.env שורש
      POSTGRES_DB: saas_production_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_production_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. שרת ה-Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_backend_api
    restart: always
    depends_on:
      postgres-db:
        condition: service_healthy # ה-Backend יעלה רק אחרי שהדאטאבייס מוכן לקבל פניות
    env_file:
      - ./backend/.env.production
    networks:
      - saas-network

  # 3. שרת ה-Frontend (React + Vite Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend_client
    restart: always
    networks:
      - saas-network

# 4. מנוע האוטומציה וההפצה - n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: saas_n8n_automation
    restart: always
    ports:
      - "5678:5678" # חשיפת ממשק הניהול הויזואלי של n8n בדפדפן
    volumes:
      - n8n_data:/home/node/.n8n # שמירת הגדרות החשבונות והלוגים של הריצות
      - ./n8n-automation/workflows:/etc/n8n/workflows # קריאת קובצי ה-JSON של האוטומציות
    env_file:
      - ./backend/.env.production # 🔥 מושך את כל המשתנים ישירות מהקובץ הזה
    environment:
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENCRYPTION_KEY=your_secret_key # משתנה פנימי של n8n
      - N8N_ENVS_MODE=strict               # 🔥 1. מאפשר גישה למשתני סביבה במצב מאובטח
      - N8N_ENVS_LIST=TELEGRAM_CHAT_ID,TELEGRAM_TOKEN     # 🔥 2. רשימת המשתנים שמותר ל-n8n לקרוא (מופרדים בפסיק)
    networks:
      - saas-network

  # 5. שומר הסף והראוטר המרכזי - Nginx
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: saas_nginx_proxy
    restart: always
    ports:
      - "80:80"   # מאזין לחריצי הרשת הציבוריים של השרת
      - "443:443" # מוכן לתעודות SSL בהמשך
    depends_on:
      - backend
      - frontend
      - n8n # Nginx ימתין גם לעליית n8n
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge

volumes:
  postgres_data: # מבטיח שהדאטאבייס ישמר על הדיסק
  n8n_data:      # מבטיח שהמידע הווירטואלי והחיבורים של n8n ישמרו על הדיסק